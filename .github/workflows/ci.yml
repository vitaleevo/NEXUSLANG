name: NexusLang Quality Gate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    env:
      CARGO_TERM_COLOR: always
      NEXUS_RUN_CLIPPY: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Run quality gate
        run: bash scripts/quality-gate.sh

      - name: Check release scripts
        run: |
          bash -n scripts/package-release.sh
          bash -n scripts/validate-release-package.sh
          bash -n scripts/validate-release-second-env.sh
          bash -n scripts/sign-release-artifacts.sh
          bash -n scripts/connect-github-release.sh
          bash -n scripts/release-dry-run.sh
          bash -n scripts/release-dry-run-strict.sh

      - name: Build local release package
        run: bash scripts/package-release.sh

      - name: Validate local release package
        run: bash scripts/validate-release-package.sh

      - name: Upload local release artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: nexuslang-local-release
          path: |
            dist/nexuslang-v*-local-release.tar.gz
            dist/nexuslang-v*-local-release.tar.gz.sha256
          if-no-files-found: error
